<!DOCTYPE html>
<html>
<head>
  <title>Legacy Data Import</title>
  <style>
    body { font-family: sans-serif; max-width: 640px; margin: 60px auto; padding: 0 20px; }
    label { display: block; margin-top: 16px; font-weight: bold; }
    input[type=file] { margin-top: 6px; display: block; }
    input[type=text] { width: 100%; padding: 8px; margin-top: 6px; box-sizing: border-box; font-family: monospace; }
    button { margin-top: 24px; padding: 10px 28px; font-size: 16px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    pre { background: #f4f4f4; padding: 16px; white-space: pre-wrap; word-break: break-all; margin-top: 24px; border-radius: 4px; }
    .note { color: #888; font-size: 13px; margin-top: 4px; }
    .running { color: #c07000; }
    .done { color: #007700; }
    .err { color: #cc0000; }
  </style>
</head>
<body>
  <h2>Legacy Data Import</h2>
  <p>Uploads the three CSV files and runs the full import in one request. Safe to re-run.</p>

  <label>API Base URL</label>
  <input type="text" id="apiUrl" placeholder="https://salon-api-xxxx-uc.a.run.app" />

  <label>JWT Token</label>
  <input type="text" id="token" placeholder="eyJ…" />
  <p class="note">Log in to the app as Jini → open browser DevTools → Application → Local Storage → copy the <code>token</code> value.</p>

  <label>Client Details.txt</label>
  <input type="file" id="clientsFile" accept=".txt,.csv" />

  <label>Future and Past Bookings.txt</label>
  <input type="file" id="bookingsFile" accept=".txt,.csv" />

  <label>Receipt Transactions.txt</label>
  <input type="file" id="receiptsFile" accept=".txt,.csv" />

  <button id="btn" onclick="runImport()">Run Import</button>

  <pre id="output">Results will appear here…</pre>

  <script>
    async function runImport() {
      const apiUrl  = document.getElementById('apiUrl').value.trim().replace(/\/$/, '');
      const token   = document.getElementById('token').value.trim();
      const clients = document.getElementById('clientsFile').files[0];
      const bookings= document.getElementById('bookingsFile').files[0];
      const receipts= document.getElementById('receiptsFile').files[0];
      const output  = document.getElementById('output');
      const btn     = document.getElementById('btn');

      if (!clients || !bookings || !receipts) { alert('All three files are required'); return; }
      if (!token)   { alert('JWT token is required'); return; }
      if (!apiUrl)  { alert('API URL is required'); return; }

      btn.disabled = true;
      output.className = 'running';
      output.textContent = 'Running… (this takes 2–5 minutes, please wait)';

      const form = new FormData();
      form.append('clients_csv', clients);
      form.append('all_bookings_csv', bookings);
      form.append('receipts_csv', receipts);

      try {
        const resp = await fetch(`${apiUrl}/admin/import-legacy`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
          body: form,
        });
        const data = await resp.json();
        output.className = resp.ok ? 'done' : 'err';
        output.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        output.className = 'err';
        output.textContent = 'Error: ' + e.message;
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
